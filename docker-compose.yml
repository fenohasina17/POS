services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/var/www:cached
      - backend-vendor:/var/www/vendor
    ports:
      - "9000:9000"
    environment:
      APP_ENV: local
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: app
      DB_USERNAME: app
      DB_PASSWORD: secret
    depends_on:
      - db
    entrypoint: ["/var/www/entrypoint.sh"]
    command: ["php-fpm"]

  backend-nginx:
    image: nginx:stable-alpine
    depends_on:
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./backend/public:/var/www/public:ro
      - ./docker/nginx/backend.conf:/etc/nginx/conf.d/default.conf:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend-nginx

volumes:
  db-data:
  backend-vendor:
