x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"

services:
  # --- Base de Données (Postgres) ---
  db:
    image: postgres:15
    restart: always
    logging: *default-logging
    env_file: .env
    environment:
      - POSTGRES_DB=${DB_DATABASE}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pos_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-giovanni} -d ${DB_DATABASE:-pos_system}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # --- Cache Redis ---
  redis:
    image: redis:7-alpine
    restart: always
    logging: *default-logging
    volumes:
      - redis_data:/data
    networks:
      - pos_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Backend Laravel (PHP-FPM) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    logging: *default-logging
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    volumes:
      - storage_data:/var/www/storage
    networks:
      - pos_network

  # --- Serveur Web (Nginx + HTTPS) ---
  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    restart: always
    logging: *default-logging
    ports:
      - "8000:80"    # HTTP → redirige vers HTTPS
      - "8443:443"   # HTTPS (API)
    environment:
      - SERVER_IP=${SERVER_IP:-192.168.0.9}
    depends_on:
      - backend
    volumes:
      - storage_data:/var/www/storage
      - ssl_nginx_data:/etc/nginx/ssl
    networks:
      - pos_network

  # --- Frontend (Vue.js + HTTPS) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    logging: *default-logging
    ports:
      - "5173:80"    # HTTP → redirige vers HTTPS
      - "5443:443"   # HTTPS (Frontend)
    environment:
      - SERVER_IP=${SERVER_IP:-192.168.0.9}
    depends_on:
      - nginx
    volumes:
      - ssl_frontend_data:/etc/nginx/ssl
    networks:
      - pos_network

  # --- Sauvegarde automatique PostgreSQL ---
  backup:
    image: postgres:15
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      - DB_HOST=db
    volumes:
      - backup_data:/backups
      - ./docker/backup/backup.sh:/backup.sh:ro
    entrypoint: >
      sh -c "
        echo '⏰ Sauvegarde planifiée — toutes les 24h à 02h00';
        while true; do
          NEXT=$$(date -d 'tomorrow 02:00' +%s 2>/dev/null || date -v+1d -f '%H:%M' '02:00' +%s 2>/dev/null || echo $$(( $$(date +%s) + 86400 )));
          NOW=$$(date +%s);
          SLEEP=$$((NEXT - NOW));
          echo \"Prochaine sauvegarde dans $${SLEEP}s ($$(date -d \"@$$NEXT\" 2>/dev/null || date -r $$NEXT))\";
          sleep $$SLEEP;
          sh /backup.sh;
        done
      "
    networks:
      - pos_network

  # --- Monitoring (Uptime Kuma) ---
  uptime-kuma:
    image: louislam/uptime-kuma:1
    pull_policy: if_not_present
    restart: always
    ports:
      - "3001:3001"
    volumes:
      - uptime_kuma_data:/app/data
    networks:
      - pos_network

  # --- Jenkins (CI/CD Automation) ---
  jenkins:
    build:
      context: ./docker/jenkins
      dockerfile: Dockerfile
    restart: always
    logging: *default-logging
    privileged: true
    user: root
    ports:
      - "9090:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - pos_network

networks:
  pos_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  jenkins_data:
  storage_data:
  backup_data:
  ssl_nginx_data:
  ssl_frontend_data:
  uptime_kuma_data:
