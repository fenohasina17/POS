version: "3.9"

# ═══════════════════════════════════════════════════════════
#  Docker Compose — Développement local
#  Stack : PostgreSQL + Laravel (php-fpm) + Nginx + Vue.js
# ═══════════════════════════════════════════════════════════

networks:
  app-net:
    driver: bridge

volumes:
  pg_data:
  backend_storage:

services:

  # ── PostgreSQL ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: devops_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-appdb}
      POSTGRES_USER: ${DB_USERNAME:-appuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-appuser} -d ${DB_DATABASE:-appdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Laravel (php-fpm) ───────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: final
    container_name: devops_backend
    restart: unless-stopped
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: ${APP_KEY}
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-appdb}
      DB_USERNAME: ${DB_USERNAME:-appuser}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      CACHE_DRIVER: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
    volumes:
      - ./backend:/var/www
      - backend_storage:/var/www/storage
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-net

  # ── Nginx (reverse-proxy backend) ──────────────────────
  nginx-backend:
    image: nginx:1.27-alpine
    container_name: devops_nginx_backend
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend/public:/var/www/public:ro
      - ./docker/nginx/backend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - app-net

  # ── Vue.js (dev server) ─────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: devops_frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - app-net
