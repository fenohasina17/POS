version: "3.9"

# ═══════════════════════════════════════════════════════════
#  Jenkins sur Docker Desktop / WSL2
#  Accès : http://localhost:8080
# ═══════════════════════════════════════════════════════════

services:
  jenkins:
    image: jenkins/jenkins:lts-jdk21
    container_name: jenkins
    restart: unless-stopped
    user: root                          # Pour accéder au socket Docker
    ports:
      - "8080:8080"
      - "50000:50000"                   # Agents Jenkins
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false -Xmx1g
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock   # Docker-in-Docker (DinD)
      - /usr/bin/docker:/usr/bin/docker             # CLI Docker
      # Partager le kubeconfig de Docker Desktop
      - ~/.kube/config:/root/.kube/config:ro

volumes:
  jenkins_home: