# ⚠️  NE PAS committer ce fichier avec de vraies valeurs !
# Utiliser : kubectl apply -f k8s/postgres/secret.yaml
# Les valeurs sont en base64 : echo -n "valeur" | base64

apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: devops-app
type: Opaque
data:
  # echo -n "appdb"   | base64  → YXBwZGI=
  POSTGRES_DB:       YXBwZGI=
  # echo -n "appuser" | base64  → YXBwdXNlcg==
  POSTGRES_USER:     YXBwdXNlcg==
  # echo -n "StrongP@ssw0rd!" | base64
  POSTGRES_PASSWORD: U3Ryb25nUEBzc3cwcmQh