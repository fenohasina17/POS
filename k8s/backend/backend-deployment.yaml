apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: devops-app
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        # Attendre que PostgreSQL soit prêt avant de démarrer Laravel
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres-svc 5432; do
                echo "Waiting for postgres..."; sleep 3;
              done
              echo "PostgreSQL is ready!"

        # Exécuter les migrations Laravel au démarrage
        - name: migrate
          image: REGISTRY/backend:IMAGE_TAG     # remplacé par Jenkins
          command: ["php", "artisan", "migrate", "--force"]
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret

      containers:
        - name: backend
          image: REGISTRY/backend:IMAGE_TAG     # remplacé par Jenkins
          ports:
            - containerPort: 9000
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret
          volumeMounts:
            - name: storage
              mountPath: /var/www/storage
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 15

        # Sidecar Nginx pour servir le backend PHP-FPM
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
            - name: storage
              mountPath: /var/www/storage
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"

      volumes:
        - name: nginx-conf
          configMap:
            name: nginx-backend-conf
        - name: storage
          emptyDir: {}