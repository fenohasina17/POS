apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  namespace: devops-app
spec:
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: NodePort              # Accessible via localhost sur Docker Desktop
  # nodePort: 30080           # Décommentez pour fixer le port