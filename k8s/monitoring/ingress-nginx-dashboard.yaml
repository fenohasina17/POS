apiVersion: v1
kind: ConfigMap
metadata:
  name: ingress-nginx-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  ingress-nginx.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "Requêtes par seconde",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "round(sum(rate(nginx_ingress_controller_requests[2m])) by (status), 0.001)",
              "legendFormat": "{{status}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "line", "fillOpacity": 15 }
            }
          }
        },
        {
          "title": "Taux d'erreurs (4xx / 5xx)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "round(sum(rate(nginx_ingress_controller_requests{status=~\"4..\"}[2m])), 0.001)",
              "legendFormat": "4xx"
            },
            {
              "expr": "round(sum(rate(nginx_ingress_controller_requests{status=~\"5..\"}[2m])), 0.001)",
              "legendFormat": "5xx"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "line", "fillOpacity": 15 }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "5xx" },
                "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }]
              },
              {
                "matcher": { "id": "byName", "options": "4xx" },
                "properties": [{ "id": "color", "value": { "fixedColor": "orange", "mode": "fixed" } }]
              }
            ]
          }
        },
        {
          "title": "Latence P50 / P95 / P99",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(nginx_ingress_controller_request_duration_seconds_bucket[2m])) by (le))",
              "legendFormat": "p50"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(nginx_ingress_controller_request_duration_seconds_bucket[2m])) by (le))",
              "legendFormat": "p95"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(nginx_ingress_controller_request_duration_seconds_bucket[2m])) by (le))",
              "legendFormat": "p99"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "drawStyle": "line", "fillOpacity": 10 }
            }
          }
        },
        {
          "title": "Connexions actives",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "expr": "nginx_ingress_controller_nginx_process_connections{state=\"active\"}",
              "legendFormat": "active"
            },
            {
              "expr": "nginx_ingress_controller_nginx_process_connections{state=\"reading\"}",
              "legendFormat": "reading"
            },
            {
              "expr": "nginx_ingress_controller_nginx_process_connections{state=\"waiting\"}",
              "legendFormat": "waiting"
            },
            {
              "expr": "nginx_ingress_controller_nginx_process_connections{state=\"writing\"}",
              "legendFormat": "writing"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "drawStyle": "line", "fillOpacity": 15 }
            }
          }
        },
        {
          "title": "Bytes In / Out",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "targets": [
            {
              "expr": "sum(rate(nginx_ingress_controller_request_size_sum[2m]))",
              "legendFormat": "bytes in"
            },
            {
              "expr": "sum(rate(nginx_ingress_controller_response_size_sum[2m]))",
              "legendFormat": "bytes out"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "custom": { "drawStyle": "line", "fillOpacity": 15 }
            }
          }
        },
        {
          "title": "Controller — CPU & Mémoire",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "targets": [
            {
              "expr": "rate(process_cpu_seconds_total{job=\"ingress-nginx-metrics\"}[2m])",
              "legendFormat": "CPU (cores)"
            },
            {
              "expr": "process_resident_memory_bytes{job=\"ingress-nginx-metrics\"} / 1024 / 1024",
              "legendFormat": "RSS (MiB)"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "line", "fillOpacity": 10 }
            }
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["ingress", "nginx"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Ingress NGINX",
      "uid": "ingress-nginx-overview"
    }
