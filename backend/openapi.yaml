  /api/cash-register-sessions:
    get:
      tags: [CashRegisterSessions]
      security:
        - bearerAuth: []
    post:
      tags: [CashRegisterSessions]
      security:
        - bearerAuth: []
  /api/cash-register-sessions/{id}:
    patch:
      tags: [CashRegisterSessions]
      security:
        - bearerAuth: []
  /api/cash-register-sessions/{id}/summary:
    get:
      tags: [CashRegisterSessions]
      security:
        - bearerAuth: []
  /api/cash-register-sessions/{id}/reopen:
    post:
      tags: [CashRegisterSessions]
      security:
        - bearerAuth: []
  /api/cash-transactions:
    get:
      tags: [CashTransactions]
      security:
        - bearerAuth: []
    post:
      tags: [CashTransactions]
      security:
        - bearerAuth: []
  /api/printers:
    get:
      tags: [Printers]
      security:
        - bearerAuth: []
    post:
      tags: [Printers]
      security:
        - bearerAuth: []
  /api/printer-scan:
    get:
      tags: [Printers]
      security:
        - bearerAuth: []
  /api/printers/invoice/{orderId}:
    post:
      tags: [Printers]
      security:
        - bearerAuth: []
  /api/printers/session-recap/{sessionId}:
    post:
      tags: [Printers]
      security:
        - bearerAuth: []
  /api/printer-types:
    get:
      tags: [PrinterTypes]
      security:
        - bearerAuth: []
    post:
      tags: [PrinterTypes]
      security:
        - bearerAuth: []
  /api/tables:
    get:
      tags: [Tables]
      security:
        - bearerAuth: []
    post:
      tags: [Tables]
      security:
        - bearerAuth: []
  /api/tables/available:
    get:
      tags: [Tables]
      security:
        - bearerAuth: []
  /api/tables/occupied:
    get:
      tags: [Tables]
      security:
        - bearerAuth: []
  /api/tables/{id}/status:
    patch:
      tags: [Tables]
      security:
        - bearerAuth: []
  /api/tables/statistics:
    get:
      tags: [Tables]
      security:
        - bearerAuth: []
  /api/roles:
    get:
      tags: [Roles]
      security:
        - bearerAuth: []
