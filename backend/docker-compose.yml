services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: laravel_php
    volumes:
      - .:/var/www
      - /var/www/vendor  # Volume anonyme pour vendor
      - /var/www/storage/logs  # Volume anonyme pour logs
      - /var/www/bootstrap/cache  # Volume anonyme pour cache
    networks:
      - laravel
    environment:
      - PHP_FPM_POOL_NAME=laravel
      - PHP_FPM_USER=www-data
      - PHP_FPM_GROUP=www-data
      - PHP_OPCACHE_ENABLE=1
      - PHP_OPCACHE_MEMORY_CONSUMPTION=128
      - PHP_OPCACHE_MAX_ACCELERATED_FILES=10000
      - PHP_FPM_PM=dynamic
      - PHP_FPM_PM_MAX_CHILDREN=20
      - PHP_FPM_PM_START_SERVERS=5
      - PHP_FPM_PM_MIN_SPARE_SERVERS=3
      - PHP_FPM_PM_MAX_SPARE_SERVERS=10
    env_file:
      - .env
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  nginx:
    image: nginx:alpine
    container_name: laravel_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /var/www/storage/logs  # Logs en volume anonyme
    depends_on:
      - php
      - postgres
    networks:
      - laravel
    restart: unless-stopped
    environment:
      - NGINX_WORKER_PROCESSES=auto
      - NGINX_WORKER_CONNECTIONS=1024
    extra_hosts:
      - "host.docker.internal:host-gateway"

  postgres:
    image: postgres:15-alpine
    container_name: laravel_postgres
    environment:
      POSTGRES_DB: posix
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_ROOT_PASSWORD: root
      # Optimisations PostgreSQL
      POSTGRES_SHARED_BUFFERS: 256MB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 768MB
      POSTGRES_WORK_MEM: 16MB
      POSTGRES_MAINTENANCE_WORK_MEM: 64MB
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    ports:
      - "5432:5432"
    networks:
      - laravel
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d posix"]
      interval: 10s
      timeout: 5s
      retries: 5
    shm_size: 256mb  # Shared memory pour PostgreSQL
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: laravel_pgadmin
    profiles:
      - tools  # Ne démarre pas par défaut
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: secret
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    networks:
      - laravel
    depends_on:
      - postgres
    restart: unless-stopped

  # Redis pour cache (optionnel mais très rapide)
  redis:
    image: redis:alpine
    container_name: laravel_redis
    ports:
      - "6379:6379"
    networks:
      - laravel
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

networks:
  laravel:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: laravel_bridge

volumes:
  postgres_data:
    driver: local